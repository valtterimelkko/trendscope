[pytest]
asyncio_mode = auto
testpaths = scraper/tests detection/tests alerts/tests monitoring/tests tests
addopts = 
    --maxfail=3
    --timeout=60
    -x
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires services)
    live: Live tests with real APIs (skip by default)
    load: Load/stress tests
    slow: Tests that take longer than 10 seconds
    requires_redis: Tests requiring Redis
    requires_postgres: Tests requiring PostgreSQL
    requires_proxy: Tests requiring IPRoyal proxy
    requires_captcha: Tests requiring captcha solving service
    memory_heavy: Tests that use significant memory
