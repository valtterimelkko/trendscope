# pytest configuration for Trendscope
[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = scraper/tests detection/tests alerts/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires services)
    live: Live tests with real APIs
    load: Load/stress tests
    e2e: End-to-end tests
    slow: Slow tests (> 1 second)
    requires_redis: Tests requiring Redis
    requires_postgres: Tests requiring PostgreSQL
    requires_proxy: Tests requiring IPRoyal proxy
    requires_tiktok: Tests requiring TikTok API access

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage configuration
coverage_source = scraper,detection,alerts
coverage_omit = 
    */tests/*
    */test_*.py
    */conftest.py
    */venv/*
    */.venv/*

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --ignore=frontend
    --ignore=.venv

# Console output
timeout = 300
