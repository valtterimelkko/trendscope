<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Essential Meta Tags -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Sign In - ProductMotion.app | AI Product Video Creator</title>
  <meta name="description" content="Sign in to ProductMotion.app and create professional product videos in seconds. No video editing experience needed.">
  <meta name="keywords" content="product video, AI video creator, video generation, e-commerce, SaaS">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph Meta Tags (Social Media) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sign In - ProductMotion.app | AI Product Video Creator">
  <meta property="og:description" content="Create professional product videos in seconds with AI-powered automation.">
  <meta property="og:url" content="https://productmotion.app/login">
  <meta property="og:image" content="https://productmotion.app/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="ProductMotion.app">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sign In - ProductMotion.app">
  <meta name="twitter:description" content="Create professional product videos in seconds with AI.">
  <meta name="twitter:image" content="https://productmotion.app/assets/og-image.png">

  <!-- Additional Meta Tags -->
  <meta name="author" content="ProductMotion.app">
  <meta name="theme-color" content="#FF4444">
  <link rel="canonical" href="https://productmotion.app/login">
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

  <!-- Fonts and Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>

  <!-- JSON-LD Structured Data (WebPage + Organization) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Sign In",
    "description": "Sign in to ProductMotion.app account",
    "url": "https://productmotion.app/login",
    "organizationName": "ProductMotion.app",
    "logo": "https://productmotion.app/assets/images/ProductMotion.app Logo 1024x359 White Background.png"
  }
  </script>
</head>
<body class="bg-gray-100">
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a href="#" class="flex items-center">
        <img src="../assets/images/ProductMotion.app Logo 1024x359 White Background.png" alt="ProductMotion.app Logo" class="h-8 sm:h-10 lg:h-[4.394rem] w-auto">
    </a>
      <!-- Right side -->
      <div class="flex items-center space-x-6">
        <span class="text-gray-600 font-medium">New to ProductMotion.app?</span>
      <button class="bg-gradient-to-r from-red-400 to-orange-500 text-white font-semibold px-6 py-3 rounded-lg transition-all duration-200 hover:transform hover:-translate-y-0.5 hover:shadow-lg">
        Start Free Trial
      </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="min-h-screen flex items-center justify-center py-12 px-6">
    <div class="bg-white rounded-2xl shadow-lg p-12 w-full max-w-xl">
      <!-- Welcome Header -->
      <h1 class="text-4xl font-bold text-gray-900 text-center mb-4">Welcome back</h1>
      <p class="text-gray-600 text-center mb-8">
        Sign in to your ProductMotion.app account and<br>continue creating professional product videos.
      </p>

      <!-- Demo Account Section -->
      <div class="bg-gray-50 rounded-lg p-6 mb-8">
        <div class="flex items-start mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-purple-500 text-xl mr-3 mt-1"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <h3 class="text-gray-900 font-semibold text-lg">Try the demo account</h3>
        </div>
        <div class="ml-9">
          <p class="text-gray-600 text-sm mb-1">
            <span class="font-semibold">Email:</span> demo@productmotion.app
          </p>
          <p class="text-gray-600 text-sm mb-4">
            <span class="font-semibold">Password:</span> demo123
          </p>
            <button id="demo-account-btn" class="w-full bg-white border border-gray-300 text-gray-700 font-medium py-3 rounded-lg hover:bg-gray-50">
              Use Demo Account
            </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="flex items-center mb-8">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">or sign in with your account</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Sign In Form -->
      <form action="javascript:void(0);">
        <div class="mb-6">
          <label class="block text-gray-900 font-semibold mb-2">Email Address</label>
          <input 
            type="email" 
            name="email"
            placeholder="Enter your email address" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700"
          >
        </div>

        <div class="mb-6">
          <label class="block text-gray-900 font-semibold mb-2">Password</label>
          <input 
            type="password" 
            name="password"
            placeholder="Enter your password" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700"
          >
        </div>

        <!-- Error message area -->
        <div id="login-error-msg" class="text-red-600 font-medium text-sm mb-4 p-3 bg-red-50 border border-red-200 rounded-lg hidden"></div>

        <!-- Remember me and Forgot password -->
        <div class="flex items-center justify-between mb-8">
          <label class="flex items-center">
            <input type="checkbox" class="w-4 h-4 border-gray-300 rounded">
            <span class="ml-2 text-gray-700">Remember me</span>
          </label>
          <a href="#" class="text-blue-500 hover:underline font-medium">Forgot password?</a>
        </div>

        <!-- Sign In Button -->
        <button 
          type="submit" 
          class="w-full bg-red-400 hover:bg-red-500 text-white font-semibold py-3 rounded-lg mb-8"
        >
          Sign In
        </button>
      </form>

      <!-- Create Account Link -->
      <p class="text-center text-gray-600">
        Don't have an account? <a href="register.html" class="text-blue-500 hover:underline font-medium">Create one for free</a>
      </p>
    </div>
  </main>
  <!-- Import main.js to load Tailwind CSS -->
  <link rel="stylesheet" href="../styles/index.css">
    <script type="module" src="../main.js"></script>
  <!-- Import login.js as module for page logic -->
  <script type="module" src="../js/login.js"></script>
</body>
</html>
